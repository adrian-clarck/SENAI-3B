<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="src/styles/global.css" />
    <link rel="stylesheet" href="src/styles/cadastro.css" />

    <title>TechFood - Cadastro de Pratos</title>
  </head>

  <body>
    <header id="topo-loja">
      <h1 id="titulo-site">TechFood - Sabor & Saber</h1>
      <p id="boas-vindas">Cadastrar novo prato</p>

      <input type="checkbox" id="bt_menu" />

      <label for="bt_menu" id="label-menu"> &#9776; </label>

      <nav id="menu">
        <ul>
          <li><a href="index.html">Cardápio</a></li>
          <li><a href="pedidos.html">Meus Pedidos</a></li>
          <li><a href="cadastro.html" class="ativo">Cadastrar Prato</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section id="secao-cadastro">
        <h2 class="titulo-secao">🍽 Cadastrar Novo Prato</h2>

        <form id="form-cadastro">
          <label>Nome</label>
          <input type="text" id="nome" required />

          <label>Descrição</label>
          <textarea id="descricao" required></textarea>

          <label>Preço</label>
          <input type="number" id="preco" step="0.01" min="0.01" required />

          <label for="categoria">Categoria</label>

          <select id="categoria" required>
            <option value="">Selecione...</option>
            <option value="Bebidas">Bebidas</option>
            <option value="Lanches">Lanches</option>
            <option value="Massas">Massas</option>
            <option value="Pizzas">Pizzas</option>
            <option value="Sobremesas">Sobremesas</option>
            <option value="Prato Principal">Prato Principal</option>
          </select>

          <label>Imagem</label>
          <input type="file" id="imagem" accept="image/*" />

          <label class="check-disponivel">
            <input type="checkbox" id="disponivel" checked />
            Disponível
          </label>

          <button type="submit">Cadastrar Produto</button>
        </form>

        <div id="mensagem"></div>
      </section>
    </main>

    <footer id="rodape">
      <div class="info-footer">
        <p><strong>TechFood 2026</strong></p>
        <p>Escola SENAI Ítalo Bologna - Itu/SP</p>
      </div>
    </footer>

    <script src="src/scripts/global.js"></script>
    <script src="src/scripts/api.js"></script>
    <script src="src/scripts/cadastro.js"></script>
  </body>
</html>
